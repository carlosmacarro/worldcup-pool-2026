<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>World Cup Pool Admin</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell compact">
      <header class="hero">
        <div>
          <p class="eyebrow">Admin</p>
          <h1>Sync now</h1>
          <p class="subtitle">Use this after adding Excel files or changing settings.</p>
        </div>
      </header>

      <section class="panel admin-panel">
        <label for="secret">ADMIN_SECRET</label>
        <input id="secret" type="password" autocomplete="current-password" placeholder="Paste your admin secret" />
        <button id="syncBtn" class="primary-button" type="button">Run full sync</button>
        <button id="statusBtn" class="ghost-button" type="button">Check last sync</button>
        <button id="debugBtn" class="ghost-button" type="button">Check API mapping</button>
        <pre id="output" class="output">Ready.</pre>
      </section>
    </main>

    <script type="module">
      const btn = document.querySelector('#syncBtn');
      const statusBtn = document.querySelector('#statusBtn');
      const debugBtn = document.querySelector('#debugBtn');
      const secret = document.querySelector('#secret');
      const output = document.querySelector('#output');
      let pollTimer = null;

      function getSecret() {
        return secret.value.trim();
      }

      async function readResponse(response) {
        const text = await response.text();
        const contentType = response.headers.get('content-type') || '';

        if (contentType.includes('application/json')) {
          try {
            return { json: JSON.parse(text), text };
          } catch (error) {
            return { json: null, text: `JSON parse failed: ${error.message}\n\n${text}` };
          }
        }

        try {
          return { json: JSON.parse(text), text };
        } catch {
          const cleaned = text.replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
          return {
            json: null,
            text: [
              `HTTP ${response.status} ${response.statusText}`,
              'Netlify returned HTML instead of JSON. This usually means the function crashed, timed out, or the function URL was not deployed.',
              cleaned ? `Response preview: ${cleaned.slice(0, 1500)}` : ''
            ].filter(Boolean).join('\n\n')
          };
        }
      }



      function formatDebug(data) {
        const lines = [];
        lines.push('API / Excel mapping diagnostic');
        lines.push('');
        lines.push(`Generated: ${data.generatedAt}`);
        lines.push(`API matches read: ${data.counts?.apiMatches ?? '?'}`);
        lines.push(`Excel group fixtures: ${data.counts?.excelGroupFixtures ?? '?'}`);
        lines.push(`Stored matches: ${data.counts?.storedMatches ?? '?'}`);
        lines.push(`Timezone used for Excel dates: ${data.config?.excelTimeZone || 'unknown'}`);
        lines.push(`Date tolerance: ${data.config?.matchDateToleranceHours || 'unknown'} hours`);
        lines.push('');

        if (Array.isArray(data.problemRows) && data.problemRows.length) {
          lines.push('Problem rows:');
          for (const row of data.problemRows.slice(0, 20)) {
            lines.push(`- Match ${row.matchNo}: ${row.excel.homeTeam} vs ${row.excel.awayTeam} (${row.excel.kickoff || 'no kickoff'})`);
            for (const problem of row.problems) lines.push(`  • ${problem}`);
            if (row.wouldMapNow?.api) {
              const score = row.wouldMapNow.score?.home == null ? 'no score' : `${row.wouldMapNow.score.home}-${row.wouldMapNow.score.away}`;
              lines.push(`  Would map to API ${row.wouldMapNow.apiId}: ${row.wouldMapNow.api.homeTeam} vs ${row.wouldMapNow.api.awayTeam}, ${row.wouldMapNow.status}, ${score}, diff ${row.wouldMapNow.dateDiffHours ?? '?'}h`);
            }
            if (Array.isArray(row.relatedApiCandidates) && row.relatedApiCandidates.length) {
              lines.push('  Related API candidates:');
              for (const c of row.relatedApiCandidates.slice(0, 3)) {
                lines.push(`    - API ${c.api.apiId}: ${c.api.homeTeam} vs ${c.api.awayTeam}, ${c.api.utcDate}, ${c.api.status}, ${c.scoreText || 'no score'}, diff ${c.dateDiffHours ?? '?'}h`);
              }
            }
          }
          if (data.problemRows.length > 20) lines.push(`- ...and ${data.problemRows.length - 20} more problem rows`);
        } else {
          lines.push('No obvious mapping problems found.');
        }

        if (Array.isArray(data.warnings) && data.warnings.length) {
          lines.push('');
          lines.push('Warnings:');
          for (const warning of data.warnings.slice(0, 20)) {
            lines.push(`- ${warning.message || JSON.stringify(warning)}`);
          }
          if (data.warnings.length > 20) lines.push(`- ...and ${data.warnings.length - 20} more warnings`);
        }

        return lines.join('\n');
      }

      function formatLog(log) {
        if (!log) return 'No sync log found yet.';
        const lines = [];
        lines.push(`Started: ${log.started_at}`);
        lines.push(`Finished: ${log.finished_at || 'still running…'}`);
        lines.push(`Status: ${log.finished_at ? (log.ok ? 'OK' : 'FAILED') : 'RUNNING'}`);
        if (log.participants_count != null) lines.push(`Participants: ${log.participants_count}`);
        if (log.predictions_count != null) lines.push(`Predictions: ${log.predictions_count}`);
        if (log.matches_count != null) lines.push(`Matches: ${log.matches_count}`);
        if (log.error) lines.push(`Error: ${log.error}`);
        if (Array.isArray(log.warnings) && log.warnings.length) {
          lines.push('Warnings:');
          for (const warning of log.warnings.slice(0, 20)) {
            lines.push(`- ${warning.file ? `${warning.file}: ` : ''}${warning.message || JSON.stringify(warning)}`);
          }
          if (log.warnings.length > 20) lines.push(`- ...and ${log.warnings.length - 20} more warnings`);
        }
        return lines.join('\n');
      }

      async function fetchJsonOrShow(url, options = {}) {
        const response = await fetch(url, options);
        const parsed = await readResponse(response);
        if (!parsed.json) throw new Error(parsed.text);
        return parsed.json;
      }

      async function checkStatus(since = '') {
        const params = new URLSearchParams();
        if (since) params.set('since', since);
        const data = await fetchJsonOrShow(`/.netlify/functions/sync-status?${params}`, {
          headers: { 'x-admin-secret': getSecret() }
        });

        if (!data.ok) throw new Error(data.error || 'Could not read sync status.');
        return data;
      }

      function startPolling(since) {
        if (pollTimer) clearInterval(pollTimer);

        pollTimer = setInterval(async () => {
          try {
            const status = await checkStatus(since);
            output.textContent = `Sync status:\n\n${formatLog(status.latest)}`;

            if (status.latest?.finished_at) {
              clearInterval(pollTimer);
              pollTimer = null;
              btn.disabled = false;
            }
          } catch (error) {
            output.textContent = error.message || String(error);
            clearInterval(pollTimer);
            pollTimer = null;
            btn.disabled = false;
          }
        }, 3000);
      }

      btn.addEventListener('click', async () => {
        btn.disabled = true;
        output.textContent = 'Starting full sync in the background…';

        try {
          const data = await fetchJsonOrShow('/.netlify/functions/sync-start', {
            method: 'POST',
            headers: { 'x-admin-secret': getSecret() }
          });

          if (!data.ok) throw new Error(data.error || 'Could not start sync.');
          output.textContent = `${data.message}\n\nChecking status…`;
          startPolling(data.startedAt);
        } catch (error) {
          output.textContent = error.message || String(error);
          btn.disabled = false;
        }
      });



      debugBtn.addEventListener('click', async () => {
        debugBtn.disabled = true;
        output.textContent = 'Checking API / Excel mapping…';
        try {
          const data = await fetchJsonOrShow('/.netlify/functions/debug-mapping', {
            headers: { 'x-admin-secret': getSecret() }
          });
          if (!data.ok) throw new Error(data.error || 'Could not run mapping diagnostic.');
          output.textContent = formatDebug(data);
        } catch (error) {
          output.textContent = error.message || String(error);
        } finally {
          debugBtn.disabled = false;
        }
      });

      statusBtn.addEventListener('click', async () => {
        statusBtn.disabled = true;
        output.textContent = 'Checking last sync…';
        try {
          const status = await checkStatus();
          output.textContent = `Last sync:\n\n${formatLog(status.latest)}`;
        } catch (error) {
          output.textContent = error.message || String(error);
        } finally {
          statusBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
