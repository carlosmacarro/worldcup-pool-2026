<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>La Gran Porra</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Apuestas</p>
          <h1 id="participantName">Loading…</h1>
          <p id="participantSubtitle" class="subtitle">Apuestas de fase de grupos y eliminatoria.</p>
        </div>
        <div class="hero-actions">
          <a class="ghost-button link-button" href="/?tab=participants">← Participantes</a>
          <a class="ghost-button link-button secondary" href="/">Home</a>
        </div>
      </header>

      <nav class="tab-bar" aria-label="Bet phases">
        <a id="groupLink" class="tab-link" href="#">Fase de grupos</a>
        <a id="knockoutLink" class="tab-link" href="#">Eliminatoria</a>
      </nav>

      <section id="status" class="status-card">Loading bets…</section>

      <section class="stats-grid" aria-label="Participant summary">
        <article class="stat-card">
          <span class="stat-label">Puntos</span>
          <strong id="totalPoints">–</strong>
        </article>
        <article class="stat-card">
          <span class="stat-label">Posición grupo</span>
          <strong id="groupPositionPoints">–</strong>
        </article>
        <article class="stat-card">
          <span class="stat-label">Especiales</span>
          <strong id="specialPoints">–</strong>
        </article>
        <article class="stat-card">
          <span class="stat-label">Apuestas ejecutadas</span>
          <strong id="playedBets">–</strong>
        </article>
        <article class="stat-card">
          <span class="stat-label">Apuestas pendientes</span>
          <strong id="pendingBets">–</strong>
        </article>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2 id="betsTitle">Apuestas</h2>
          <p id="lastUpdated">Waiting for first sync</p>
        </div>
        <div id="bets" class="bets-list"></div>
      </section>
    </main>

    <script src="/participant.js" type="module"></script>
  </body>
</html>
