<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>Knockout Bets · World Cup Pool</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">World Cup 2026</p>
          <h1>Knockout bets</h1>
          <p class="subtitle">Bets from match 73 onwards: round of 32, round of 16, quarter-finals, semi-finals, third place and final.</p>
        </div>
        <a class="ghost-button link-button" href="/">Home</a>
      </header>

      <section id="status" class="status-card">Loading participants…</section>

      <section class="panel">
        <div class="panel-header">
          <h2>Choose participant</h2>
          <p>Tap a name to open their knockout predictions</p>
        </div>
        <div id="participants" class="participants-list"></div>
      </section>
    </main>

    <script src="/knockouts.js" type="module"></script>
  </body>
</html>
